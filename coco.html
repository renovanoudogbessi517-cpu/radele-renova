<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Détection de fraude</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center text-danger">Système de Détection de Fraude</h2>

            <div class="mb-3">
                <label class="form-label">Montant de la transaction</label>
                <input type="number" id="montant" class="form-control" placeholder="Entrez le montant">
            </div>

            <button onclick="verifierFraude()" class="btn btn-danger w-100">
      Vérifier
    </button>

            <div id="resultat" class="mt-3 text-center fw-bold"></div>
        </div>
    </div>


    <!-- Scrollable modal -->
    <div class="modal-dialog modal-dialog-scrollable">
        ...
    </div>

    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Launch demo modal
</button>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card" style="width: 18rem;">
        <div class="card-header">
            Header
        </div>

        <div class="card-body">
            <h5 class="card-title">Titre</h5>
            <p class="card-text">
                Contenu principal de la carte.
            </p>
        </div>

        <div class="card-footer">
            Footer
        </div>
    </div>

    <script>
        function verifierFraude() {
            let montant = document.getElementById("montant").value;
            let resultat = document.getElementById("resultat");

            if (montant > 1000000) {
                resultat.innerHTML = "⚠️ Transaction suspecte !";
                resultat.className = "text-warning";
            } else {
                resultat.innerHTML = "✅ Transaction normale";
                resultat.className = "text-success";
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
